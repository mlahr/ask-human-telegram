version: 2

project_name: ask-human-telegram

builds:
  - id: ask-human
    main: ./main.go
    binary: ask-human
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
  - id: notify-human
    main: ./cmd/notify-human
    binary: notify-human
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
  - id: ask-human-config
    main: ./cmd/ask-human-config
    binary: ask-human-config
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath

archives:
  - id: tarball
    builds:
      - ask-human
      - notify-human
      - ask-human-config
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

nfpms:
  - id: deb
    package_name: ask-human-telegram
    builds:
      - ask-human
      - notify-human
      - ask-human-config
    formats:
      - deb
    maintainer: "Michael Lahr"
    description: "Ask or notify a human through Telegram."
    homepage: "https://github.com/mlahr/ask-human-telegram"
    bindir: /usr/bin

release:
  github:
    owner: mlahr
    name: ask-human-telegram
