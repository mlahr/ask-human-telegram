version: 2

project_name: ask-human-telegram

builds:
  - id: ask-human-telegram
    main: ./main.go
    binary: ask-human-telegram
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath

archives:
  - id: tarball
    builds:
      - ask-human-telegram
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

nfpms:
  - id: deb
    package_name: ask-human-telegram
    builds:
      - ask-human-telegram
    formats:
      - deb
    maintainer: "Michael"
    description: "Send a Telegram prompt to a human and print the next reply to STDOUT."
    homepage: "https://github.com/michael/ask-human-telegram"
    bindir: /usr/bin

release:
  github:
    owner: michael
    name: ask-human-telegram